<!-- Hero Content -->
<div class="relative z-10 w-full flex flex-col items-center pt-8 pb-12 h-full">
  
  <!-- Coverflow Slideshow Container -->
  <div *ngIf="matches && matches.length > 0" 
       (touchstart)="onTouchStart($event)" 
       (touchend)="onTouchEnd($event)"
       class="w-full px-4 sm:px-8 relative h-[500px] sm:h-[600px] flex items-center justify-center animate-[fadeInUp_0.7s_ease-out]">
    
    <!-- Prev Arrow (Absolute Left) -->
    <button (click)="prevSlide()" class="absolute left-4 sm:left-8 z-40 p-3 rounded-full bg-gray-900/80 border border-gray-700 text-white hover:bg-green-600 hover:border-green-500 transition-all hidden sm:block">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>

    <!-- Loop through matches -->
    <div *ngFor="let match of matches; let i = index" 
         (click)="setIndex(i)"
         class="absolute transition-all duration-700 ease-out origin-center w-[300px] sm:w-[400px] aspect-[3/4]"
         [ngClass]="getSlideClass(i)">
      
      <!-- Portrait Poster Card -->
      <div class="w-full h-full bg-gray-900/90 backdrop-blur-xl border border-gray-700/80 rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col relative group">
        
        <!-- Abstract Player/Stadium Background inside Poster -->
        <div class="absolute inset-0 bg-gradient-to-br from-gray-800 to-gray-950 opacity-80 z-0"></div>
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTYwIDBoLTYwdjYwaDYwVjB6bS0xIDU5SDFWMWg1OHY1OHoiIGZpbGw9IiMzMzMiIGZpbGwtb3BhY2l0eT0iMC4xNSIgZmlsbC1ydWxlPSJldmVub2RkIi8+PC9zdmc+')] z-0 mix-blend-overlay"></div>
        
        <!-- Diagonal split lighting for teams -->
        <div class="absolute inset-0 opacity-40 z-0">
           <div class="absolute top-0 left-0 w-[150%] h-[150%] bg-green-500/30 blur-[80px] -translate-x-1/2 -translate-y-1/2"></div>
           <div class="absolute bottom-0 right-0 w-[150%] h-[150%] bg-blue-500/30 blur-[80px] translate-x-1/2 translate-y-1/2"></div>
        </div>

        <div class="relative z-10 flex flex-col h-full p-6">
          <!-- Stage/Group -->
          <div class="flex justify-between items-center mb-auto">
             <span class="px-3 py-1 bg-black/50 backdrop-blur-md rounded-full text-xs font-bold text-gray-300 uppercase tracking-wider border border-gray-700">{{ match.stage }}</span>
             <div *ngIf="match.status === 'LIVE'" class="w-3 h-3 bg-red-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div>
          </div>
          
          <!-- Massive VS Text -->
          <div class="w-full text-center my-6 relative">
            <h1 class="text-4xl sm:text-5xl font-black italic text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-400 uppercase tracking-tighter drop-shadow-lg leading-none transform -skew-x-12">
              {{ match.homeTeam }} <span class="text-green-500 mx-1">VS</span> {{ match.awayTeam }}
            </h1>
          </div>

          <!-- Team Shields Row -->
          <div class="flex items-center justify-center gap-6 mb-8 mt-auto">
            <div class="w-20 h-20 sm:w-24 sm:h-24 bg-gray-950/80 backdrop-blur-lg border border-gray-600 rounded-full p-3 shadow-[0_0_20px_rgba(0,0,0,0.5)] flex items-center justify-center relative">
               <img [src]="match.homeFlag" class="w-full h-full object-contain drop-shadow-md" [alt]="match.homeTeam">
            </div>
            <div class="flex flex-col items-center gap-1">
               <span class="text-sm font-bold text-gray-500 italic">VS</span>
            </div>
            <div class="w-20 h-20 sm:w-24 sm:h-24 bg-gray-950/80 backdrop-blur-lg border border-gray-600 rounded-full p-3 shadow-[0_0_20px_rgba(0,0,0,0.5)] flex items-center justify-center relative">
               <img [src]="match.awayFlag" class="w-full h-full object-contain drop-shadow-md" [alt]="match.awayTeam">
            </div>
          </div>

          <!-- Match Details & Watch Button -->
          <div class="flex items-end justify-between border-t border-gray-700/50 pt-4 mt-auto">
            <div class="flex flex-col">
               <span class="text-sm font-bold text-white">{{ match.date | date:'MMM d, yyyy' }}</span>
               <span class="text-xs text-gray-400 flex items-center gap-1">
                 <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                 {{ match.date | date:'h:mm a' }}
               </span>
               <span class="text-[10px] text-gray-500 mt-1 uppercase">{{ match.stadium }}</span>
            </div>
            
            <div class="flex items-center gap-2">
              <a [routerLink]="['/match', match.id]" class="inline-flex items-center justify-center px-4 py-2 text-sm font-bold text-gray-300 bg-gray-800 rounded-lg hover:bg-gray-700 transition-colors pointer-events-auto border border-gray-700 hover:text-white">
                Stats
              </a>
              <a routerLink="/live" class="inline-flex items-center justify-center px-4 py-2 text-sm font-bold text-gray-900 bg-green-500 rounded-lg hover:bg-green-400 transition-colors shadow-[0_0_15px_rgba(34,197,94,0.4)] pointer-events-auto">
                <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M8 5v10l7-5-7-5z"></path></svg>
                Watch
              </a>
            </div>
          </div>
          
        </div>
      </div>
    </div>

    <!-- Next Arrow (Absolute Right) -->
    <button (click)="nextSlide()" class="absolute right-4 sm:right-8 z-40 p-3 rounded-full bg-gray-900/80 border border-gray-700 text-white hover:bg-green-600 hover:border-green-500 transition-all hidden sm:block">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
    </button>

  </div>
  
  <!-- Dot Indicators -->
  <div *ngIf="matches && matches.length > 1" class="flex gap-2 mt-8 animate-[fadeInUp_0.9s_ease-out] z-20">
    <button *ngFor="let match of matches; let i = index" 
            (click)="setIndex(i)"
            class="h-2 rounded-full transition-all duration-300 focus:outline-none"
            [ngClass]="i === currentIndex() ? 'bg-green-500 w-8 shadow-[0_0_10px_rgba(34,197,94,0.5)]' : 'bg-gray-600 w-2 hover:bg-gray-500'">
    </button>
  </div>
  
</div>
